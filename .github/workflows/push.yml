name: AI HOT → WxPusher

on:
  schedule:
    - cron: "10 0 * * *"    # 北京 08:10
    - cron: "30 8 * * *"    # 北京 16:30
  workflow_dispatch:
    inputs:
      mode:
        description: "推送类型"
        required: true
        type: choice
        options:
          - daily
          - selected

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%k | tr -d ' ')
            if [ "$HOUR" = "0" ]; then
              echo "mode=daily" >> $GITHUB_OUTPUT
            else
              echo "mode=selected" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          fi

      - name: Run push
        env:
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python push.py ${{ steps.mode.outputs.mode }}