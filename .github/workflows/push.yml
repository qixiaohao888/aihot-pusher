name: AI HOT → WxPusher

on:
  schedule:
    - cron: "10 0 * * *"    # 北京时间 08:10 (UTC 00:10)
    - cron: "30 8 * * *"    # 北京时间 16:30 (UTC 08:30)
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%k | tr -d ' ')
          if [ "$HOUR" = "0" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          else
            echo "mode=selected" >> $GITHUB_OUTPUT
          fi

      - name: Run push
        env:
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python push.py ${{ steps.mode.outputs.mode }}